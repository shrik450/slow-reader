name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun test
      - name: Check for forbidden disable comments
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun run scripts/check-disable-comments.ts "origin/${{ github.base_ref }}...HEAD"
          else
            bun run scripts/check-disable-comments.ts "HEAD^...HEAD"
          fi
